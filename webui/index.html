<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Kira</title>
<style>
  :root {
    --bg: #0e1117; --panel: #161b22; --border: #2b3240;
    --user: #2563eb; --assistant: #1f2937; --text: #e6edf3;
    --muted: #8b949e; --accent: #38bdf8;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; height: 100vh; display: flex; flex-direction: column;
    background: var(--bg); color: var(--text);
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  }
  header {
    padding: 14px 20px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px; background: var(--panel);
  }
  header .spacer { flex: 1; }
  .toggle { display: flex; background: var(--bg); border: 1px solid var(--border); border-radius: 999px; padding: 3px; gap: 2px; }
  .toggle button {
    border: none; background: transparent; color: var(--muted); cursor: pointer;
    padding: 6px 14px; border-radius: 999px; font-size: 13px; font-weight: 600;
  }
  .toggle button.on { background: var(--user); color: #fff; }
  .toggle button:disabled { opacity: .6; cursor: wait; }
  .model-note { font-size: 11px; color: var(--muted); margin-top: 3px; text-align: right; }
  header .logo {
    width: 32px; height: 32px; border-radius: 8px;
    background: linear-gradient(135deg, var(--accent), var(--user));
    display: grid; place-items: center; font-weight: 700; color: #fff;
  }
  header h1 { font-size: 16px; margin: 0; font-weight: 600; }
  header .sub { font-size: 12px; color: var(--muted); }
  #chat {
    flex: 1; overflow-y: auto; padding: 24px;
    display: flex; flex-direction: column; gap: 16px;
    max-width: 820px; width: 100%; margin: 0 auto;
  }
  .msg { display: flex; gap: 10px; max-width: 85%; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .bubble {
    padding: 11px 14px; border-radius: 14px; line-height: 1.5;
    white-space: pre-wrap; word-wrap: break-word;
  }
  .user .bubble { background: var(--user); color: #fff; border-bottom-right-radius: 4px; }
  .assistant .bubble { background: var(--assistant); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .avatar {
    width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
    display: grid; place-items: center; font-size: 13px; font-weight: 700;
  }
  .user .avatar { background: var(--user); color: #fff; }
  .assistant .avatar { background: linear-gradient(135deg, var(--accent), var(--user)); color: #fff; }
  .tools {
    margin-top: 8px; font-size: 12px; color: var(--muted);
    border-top: 1px dashed var(--border); padding-top: 6px;
  }
  .tools .tool { color: var(--accent); }
  .typing .bubble { color: var(--muted); font-style: italic; }
  .dots::after { content: '...'; animation: dots 1.2s steps(4, end) infinite; }
  @keyframes dots { 0%{content:''} 25%{content:'.'} 50%{content:'..'} 75%{content:'...'} }
  footer {
    border-top: 1px solid var(--border); background: var(--panel);
    padding: 14px; display: flex; justify-content: center;
  }
  .composer { display: flex; gap: 10px; max-width: 820px; width: 100%; }
  textarea {
    flex: 1; resize: none; background: var(--bg); color: var(--text);
    border: 1px solid var(--border); border-radius: 10px; padding: 11px 13px;
    font-family: inherit; font-size: 14px; max-height: 140px;
  }
  textarea:focus { outline: none; border-color: var(--accent); }
  button {
    background: var(--user); color: #fff; border: none; border-radius: 10px;
    padding: 0 18px; font-weight: 600; cursor: pointer; font-size: 14px;
  }
  button:disabled { opacity: .5; cursor: not-allowed; }
  .hint { text-align: center; color: var(--muted); font-size: 12px; margin-top: 40px; }
</style>
</head>
<body>
  <header>
    <div class="logo">K</div>
    <div>
      <h1>Kira</h1>
      <div class="sub">assistant agentique local</div>
    </div>
    <div class="spacer"></div>
    <div>
      <div class="toggle" id="modelToggle">
        <button data-key="fast">⚡ Rapide</button>
        <button data-key="smart">🧠 Intelligent</button>
      </div>
      <div class="model-note" id="modelNote"></div>
    </div>
  </header>

  <div id="chat">
    <div class="hint">Pose une question à Kira. Elle peut chercher sur le web et lire les fichiers du workspace.<br/>Les réponses tournent en local (Ollama, CPU) — compte quelques secondes.</div>
  </div>

  <footer>
    <div class="composer">
      <textarea id="input" rows="1" placeholder="Écris ton message…  (Entrée pour envoyer, Maj+Entrée pour un saut de ligne)"></textarea>
      <button id="send">Envoyer</button>
    </div>
  </footer>

<script>
  const chat = document.getElementById('chat');
  const input = document.getElementById('input');
  const send = document.getElementById('send');

  function el(tag, cls, html) {
    const e = document.createElement(tag);
    if (cls) e.className = cls;
    if (html !== undefined) e.innerHTML = html;
    return e;
  }

  function addMessage(role, text) {
    const hint = chat.querySelector('.hint');
    if (hint) hint.remove();
    const msg = el('div', 'msg ' + role);
    const avatar = el('div', 'avatar', role === 'user' ? 'Moi' : 'K');
    const bubble = el('div', 'bubble');
    bubble.textContent = text;
    msg.appendChild(avatar);
    msg.appendChild(bubble);
    chat.appendChild(msg);
    chat.scrollTop = chat.scrollHeight;
    return { msg, bubble };
  }

  function addTyping() {
    const msg = el('div', 'msg assistant typing');
    msg.appendChild(el('div', 'avatar', 'K'));
    const bubble = el('div', 'bubble');
    bubble.innerHTML = 'Kira réfléchit<span class="dots"></span>';
    msg.appendChild(bubble);
    chat.appendChild(msg);
    chat.scrollTop = chat.scrollHeight;
    return msg;
  }

  function toolsSummary(steps) {
    const used = [];
    (steps || []).forEach(s => (s.actions || []).forEach(a => used.push(a.tool)));
    if (!used.length) return null;
    const counts = {};
    used.forEach(t => counts[t] = (counts[t] || 0) + 1);
    return Object.entries(counts).map(([t, n]) => `<span class="tool">${t}</span>×${n}`).join('  ');
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    input.style.height = 'auto';
    addMessage('user', text);
    send.disabled = true;
    const typing = addTyping();

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text })
      });
      const data = await res.json();
      typing.remove();
      if (data.error) {
        addMessage('assistant', '⚠️ Erreur : ' + data.error);
      } else {
        const { bubble } = addMessage('assistant', data.answer || '(pas de réponse)');
        const tools = toolsSummary(data.steps);
        if (tools) {
          const t = el('div', 'tools', 'Outils utilisés : ' + tools);
          bubble.appendChild(t);
        }
      }
    } catch (e) {
      typing.remove();
      addMessage('assistant', '⚠️ Impossible de joindre le serveur : ' + e.message);
    } finally {
      send.disabled = false;
      input.focus();
    }
  }

  // --- Bascule de modèle (Rapide / Intelligent) ---
  const modelToggle = document.getElementById('modelToggle');
  const modelNote = document.getElementById('modelNote');
  let profiles = [];

  function paintModel(current) {
    modelToggle.querySelectorAll('button').forEach(b => {
      const p = profiles.find(x => x.key === b.dataset.key);
      b.classList.toggle('on', p && p.model === current);
    });
    const active = profiles.find(p => p.model === current);
    modelNote.textContent = active ? active.note : '';
  }

  async function loadModel() {
    try {
      const data = await (await fetch('/api/model')).json();
      profiles = data.profiles || [];
      paintModel(data.current);
    } catch (e) { /* serveur pas prêt */ }
  }

  modelToggle.addEventListener('click', async e => {
    const btn = e.target.closest('button');
    if (!btn) return;
    const p = profiles.find(x => x.key === btn.dataset.key);
    if (!p) return;
    modelToggle.querySelectorAll('button').forEach(b => b.disabled = true);
    try {
      const res = await fetch('/api/model', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ model: p.model })
      });
      const data = await res.json();
      if (data.current) {
        paintModel(data.current);
        if (p.key === 'smart') {
          addMessage('assistant', '🧠 Mode Intelligent activé (qwen2.5:7b). Attention : sur ce PC les réponses seront lentes (~30-60s).');
        } else {
          addMessage('assistant', '⚡ Mode Rapide activé (qwen2.5:3b).');
        }
      }
    } finally {
      modelToggle.querySelectorAll('button').forEach(b => b.disabled = false);
    }
  });

  loadModel();

  send.addEventListener('click', sendMessage);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 140) + 'px';
  });
  input.focus();
</script>
</body>
</html>
